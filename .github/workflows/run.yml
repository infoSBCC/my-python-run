name: Run Python Script

on:
  schedule:
    - cron: '20 11 * * *'  # 18:20 เวลาไทย (UTC+7)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run script
        run: python main.py
